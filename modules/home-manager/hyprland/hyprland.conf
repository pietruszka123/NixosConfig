source=./monitor.conf
source=./additional_config.conf
source=./app_rules.conf


monitor=,preferred,auto,auto
env = MUTTER_DEBUG_KMS_THREAD_TYPE,"user" 

# # Screensharing fix
# windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
# windowrulev2 = noanim,class:^(xwaylandvideobridge)$
# windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
# windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
# windowrulev2 = noblur,class:^(xwaylandvideobridge)$

#windowrulev2 = immediate, class:^(Loading...)$

#windowrulev2 = plugin:hyprbars:nobar, class:.*


# windowrulev2 =noblur, class:^(?!Alacritty).*


plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 0

        # set this to 1 for gnome-like workspace switching
        link_monitors = 0


    }
}

debug:disable_logs = false

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
	scroll_factor = 0.8
    }

    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
}

# unscale XWayland
# xwayland {
#   force_zero_scaling = true
# }

# toolkit-specific scale
# env = GDK_SCALE,2

general {
    gaps_in = 1
    gaps_out = 2 #5
    border_size = 2
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgba(8F33FFee) rgba(FF00FBee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 10
    blur {
        enabled = false # change for battery
        size = 3
        passes = 1
    }
    shadow  {
	enabled = false
    }

}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = yes # you probably want this
}

master {
    #new_is_master = true
}

gestures {
    workspace_swipe_cancel_ratio = 0.3
	gesture = 4, horizontal, workspace
}
misc {
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    disable_hyprland_logo = true
	disable_splash_rendering = true
    middle_click_paste = false
}


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, alacritty
bind = $mainMod, F, exec, firefox


bind = $mainMod, N, exec, swaync-client -t -sw

bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, nautilus ~ -w
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, vicinae toggle 
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit, # dwindle
bind= $mainMod SHIFT, F, fullscreen 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9
bind = $mainMod, 0, split-workspace, 10

# Workspace 2
bind = $mainMod, KP_End,  workspace, 91
bind = $mainMod, KP_Down, workspace, 92
bind = $mainMod, KP_Next, workspace, 93
bind = $mainMod, KP_Left, togglespecialworkspace, special2
bind = $mainMod, KP_Begin, togglespecialworkspace, special3

# bind = $mainMod, KP_Begin, movetoworkspace, 5
# bind = $mainMod, KP_Right, movetoworkspace, 6
# bind = $mainMod, KP_Home, movetoworkspace, 7
# bind = $mainMod, KP_Up, movetoworkspace, 8
# bind = $mainMod, KP_Prior, movetoworkspace, 9
# bind = $mainMod, KP_Insert, movetoworkspace, 10


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5
bind = $mainMod SHIFT, 6, split-movetoworkspace, 6
bind = $mainMod SHIFT, 7, split-movetoworkspace, 7
bind = $mainMod SHIFT, 8, split-movetoworkspace, 8
bind = $mainMod SHIFT, 9, split-movetoworkspace, 9
bind = $mainMod SHIFT, 0, split-movetoworkspace, 10

# Move 2
bind = $mainMod SHIFT, KP_End,  movetoworkspace, 91
bind = $mainMod SHIFT, KP_Down, movetoworkspace, 92
bind = $mainMod SHIFT, KP_Next, movetoworkspace, 93
bind = $mainMod SHIFT, KP_Left, movetoworkspace, special:special2
bind = $mainMod SHIFT, KP_Begin, movetoworkspace, special:special3


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, split-workspace, e+1
bind = $mainMod, mouse_up, split-workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grimblast --freeze save area - | wl-copy

# Clipboard
bind = $mainMod, D, exec, cliphist list | tofi | cliphist decode | wl-copy # vicinae vicinae://extensions/vicinae/clipboard/history 

#exec-once = wl-paste -t text -w xclip -selection clipboard #wine clipboard fix

# Pin Window
bind = $mainMod, O, pin


#Wallpaper
exec-once=hyprpaper

#Cursor Theme
env = XCURSOR_SIZE,21
env = HYPRCURSOR_SIZE,21
#env = HYPRCURSOR_THEME,catppuccin-Mocha-Lavender-Cursors
env = XCURSOR_THEME,catppuccin-mocha-lavender

exec-once=hyprctl setcursor $XCURSOR_THEME $HYPRCURSOR_SIZE


# Clipboard
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data

# Workspaces
workspace = special:magic, gapsout:32


# Waybar
exec-once= waybar


# Authentication Agent
# exec-once = systemctl --user start hyprpolkitagent
exec-once = gnome-keyring-daemon --start --components=secrets
